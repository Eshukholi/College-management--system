<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System - Book Issue</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Roboto", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      flex-wrap: wrap;
    }

    .nav button {
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      font-weight: 500;
    }

    .nav button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 2rem;
    }

    .form-card,
    .books-table-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .form-card h2,
    .books-table-card h2 {
      margin-bottom: 1.5rem;
      color: #1e293b;
      font-size: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #374151;
    }

    .form-group input,
    .form-group select {
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: white;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-group input:disabled,
    .form-group select:disabled {
      background: #f9fafb;
      color: #6b7280;
      cursor: not-allowed;
      border-color: #d1d5db;
    }

    .action-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .btn-issue {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .btn-delete {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .btn-clear {
      background: linear-gradient(135deg, #6b7280, #4b5563);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .hidden {
      display: none !important;
    }

    .books-table-card h2 {
      margin-bottom: 1.5rem;
      color: #1e293b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      padding: 16px 12px;
      text-align: left;
      font-weight: 600;
      color: #374151;
      border-bottom: 3px solid #e2e8f0;
    }

    td {
      padding: 16px 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    tr:hover {
      background: #f8fafc;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-issued {
      background: #fef3c7;
      color: #d97706;
    }

    .delete-btn {
      padding: 6px 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .student-view-only {
      background: #fef3c7;
      border: 2px solid #f59e0b;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .action-row {
        flex-direction: column;
      }
      table {
        font-size: 12px;
      }
      th, td {
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 Library Management System</h1>
    <p>Advanced Book Issue & Management Dashboard</p>
  </header>

  <div class="nav">
    <button onclick="window.location.href='library.html'">🏠 Home</button>
    <button onclick="window.location.href='return.html'">📖 Book Return</button>
    <button onclick="location.reload()">🔄 Refresh</button>
  </div>

  <div class="container">
    <div class="form-card">
      <h2>📝 Book Issue Form</h2>
      <form id="issueForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="role">👤 Login Role</label>
            <select id="role" required onchange="updateAccess()">
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="form-group">
            <label for="member-id">🆔 Student ID</label>
            <input type="text" id="member-id" required />
          </div>

          <div class="form-group">
            <label for="member-name">👤 Student Name</label>
            <input type="text" id="member-name" required />
          </div>

          <div class="form-group">
            <label for="course">🎓 Course</label>
            <select id="course" required onchange="filterBooks()">
              <option value="">Select Course</option>
              <option value="bca">BCA</option>
              <option value="mca">MCA</option>
              <option value="btech-cs">B.Tech CS</option>
              <option value="btech-mech">B.Tech Mechanical</option>
              <option value="btech-ece">B.Tech ECE</option>
              <option value="diploma-mech">Diploma Mechanical</option>
            </select>
          </div>

          <div class="form-group hidden" id="teacherIdGroup">
            <label for="teacher-id">👨‍🏫 Teacher ID</label>
            <input type="text" id="teacher-id" value="1001" readonly />
          </div>

          <div class="form-group">
            <label for="book">📚 Book</label>
            <select id="book" required disabled>
              <option value="">Select Course First</option>
            </select>
          </div>

          <div class="form-group">
            <label for="issue-date">📅 Issue Date</label>
            <input type="date" id="issue-date" required />
          </div>

          <div class="form-group">
            <label for="due-date">⏰ Due Date</label>
            <input type="date" id="due-date" required />
          </div>
        </div>

        <div id="roleMessage" class="student-view-only hidden">
          👁️ <strong>Student View Only:</strong> You can view issued books below. Contact teacher to issue new books.
        </div>

        <div class="action-row">
          <button type="submit" class="btn btn-issue hidden" id="issueBtn">✅ Issue Book</button>
          <button type="button" class="btn btn-delete hidden" id="deleteBtn">🗑️ Delete Selected</button>
          <button type="button" class="btn btn-clear" onclick="clearForm()">🗑️ Clear Form</button>
        </div>
      </form>
    </div>

    <div class="books-table-card">
      <h2>📊 Issued Books Dashboard</h2>
      <table id="booksTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Student</th>
            <th>Book</th>
            <th>Course</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const allBooks = [
      { id: 1, title: "Mathematics-I (BCA-101)", code: "BCA-101", course: "bca" },
      { id: 2, title: "Programming Principle & Algorithm (BCA-102)", code: "BCA-102", course: "bca" },
      { id: 3, title: "Computer Fundamentals (BCA-103)", code: "BCA-103", course: "bca" },
      { id: 4, title: "Principle of Management (BCA-104)", code: "BCA-104", course: "bca" },
      { id: 5, title: "Business Communication (BCA-106)", code: "BCA-106", course: "bca" },
      { id: 6, title: "Mathematics-II (BCA-201)", code: "BCA-201", course: "bca" },
      { id: 7, title: "C-Programming (BCA-202)", code: "BCA-202", course: "bca" },
      { id: 8, title: "Data Structures (BCA-302)", code: "BCA-302", course: "bca" },
      { id: 9, title: "DBMS (BCA-501)", code: "BCA-501", course: "bca" },
      { id: 10, title: "Java Programming (BCA-502)", code: "BCA-502", course: "bca" },

      { id: 101, title: "Advanced Java (MCA-101)", code: "MCA-101", course: "mca" },
      { id: 102, title: "Data Structures (MCA-102)", code: "MCA-102", course: "mca" },
      { id: 103, title: "Database Systems (MCA-103)", code: "MCA-103", course: "mca" },

      { id: 201, title: "C/C++ Programming (CS-101)", code: "CS-101", course: "btech-cs" },
      { id: 202, title: "Data Structures (CS-102)", code: "CS-102", course: "btech-cs" },
      { id: 203, title: "Operating Systems (CS-103)", code: "CS-103", course: "btech-cs" },

      { id: 301, title: "Engineering Mechanics (ME-101)", code: "ME-101", course: "btech-mech" },
      { id: 302, title: "Thermodynamics (ME-102)", code: "ME-102", course: "btech-mech" },

      { id: 401, title: "Basic Electronics (ECE-101)", code: "ECE-101", course: "btech-ece" },
      { id: 402, title: "Digital Electronics (ECE-102)", code: "ECE-102", course: "btech-ece" },

      { id: 501, title: "Engineering Drawing (DME-101)", code: "DME-101", course: "diploma-mech" },
      { id: 502, title: "Machine Shop (DME-102)", code: "DME-102", course: "diploma-mech" }
    ];

    let issuedBooks = JSON.parse(localStorage.getItem('issuedBooks')) || [];

    const roleSelect = document.getElementById('role');
    const courseSelect = document.getElementById('course');
    const bookSelect = document.getElementById('book');
    const issueBtn = document.getElementById('issueBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const issueForm = document.getElementById('issueForm');
    const tableBody = document.getElementById('tableBody');
    const roleMessage = document.getElementById('roleMessage');
    const teacherIdGroup = document.getElementById('teacherIdGroup');
    const teacherIdInput = document.getElementById('teacher-id');

    function filterBooks() {
      const selectedCourse = courseSelect.value;
      bookSelect.innerHTML = '<option value="">Select Book</option>';

      if (selectedCourse) {
        const filteredBooks = allBooks.filter(book => book.course === selectedCourse);
        filteredBooks.forEach(book => {
          const option = document.createElement('option');
          option.value = book.id;
          option.textContent = book.title;
          bookSelect.appendChild(option);
        });
        bookSelect.disabled = false;
      } else {
        bookSelect.disabled = true;
      }
    }

    function updateAccess() {
      const role = roleSelect.value;
      const isStudent = role === 'student';
      const isTeacherOrAdmin = role === 'teacher' || role === 'admin';

      roleMessage.classList.toggle('hidden', !isStudent);
      teacherIdGroup.classList.toggle('hidden', !isTeacherOrAdmin);

      document.getElementById('member-id').disabled = isStudent;
      document.getElementById('member-name').disabled = isStudent;
      courseSelect.disabled = isStudent;
      bookSelect.disabled = isStudent || !courseSelect.value;
      document.getElementById('issue-date').disabled = isStudent;
      document.getElementById('due-date').disabled = isStudent;
      teacherIdInput.disabled = isStudent;

      issueBtn.classList.toggle('hidden', !isTeacherOrAdmin);
      deleteBtn.classList.toggle('hidden', !isTeacherOrAdmin);

      if (isStudent) {
        teacherIdInput.value = '1001';
      } else if (isTeacherOrAdmin) {
        teacherIdInput.value = '1001';
      }
    }

    issueForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const role = roleSelect.value;
      if (role !== 'teacher' && role !== 'admin') {
        alert('❌ Only teachers/admins can issue books!');
        return;
      }

      const teacherId = teacherIdInput.value.trim();
      if (teacherId !== '1001') {
        alert('❌ Only Teacher ID 1001 is allowed to issue books!');
        return;
      }

      const issueData = {
        id: Date.now(),
        studentId: document.getElementById('member-id').value.trim(),
        studentName: document.getElementById('member-name').value.trim(),
        course: courseSelect.options[courseSelect.selectedIndex].text,
        bookId: parseInt(bookSelect.value),
        bookTitle: bookSelect.options[bookSelect.selectedIndex].text,
        issueDate: document.getElementById('issue-date').value,
        dueDate: document.getElementById('due-date').value,
        status: 'issued',
        teacherId: '1001'
      };

      issuedBooks.unshift(issueData);
      localStorage.setItem('issuedBooks', JSON.stringify(issuedBooks));
      renderTable();
      clearForm();
      alert('✅ Book issued successfully!');
    });

    deleteBtn.addEventListener('click', () => {
      const role = roleSelect.value;
      if (role !== 'teacher' && role !== 'admin') {
        alert('❌ Admin/Teacher access required!');
        return;
      }

      if (confirm('🗑️ Delete ALL issued book records?')) {
        issuedBooks = [];
        localStorage.setItem('issuedBooks', JSON.stringify(issuedBooks));
        renderTable();
        alert('🗑️ All records deleted!');
      }
    });

    function renderTable() {
      tableBody.innerHTML = '';

      issuedBooks.forEach(book => {
        const row = document.createElement('tr');
        const isStudent = roleSelect.value === 'student';
        const actions = isStudent ? '' : `<button class="delete-btn" onclick="deleteBook(${book.id})">Delete</button>`;

        row.innerHTML = `
          <td>${book.id}</td>
          <td>${book.studentName} (${book.studentId})</td>
          <td>${book.bookTitle}</td>
          <td>${book.course}</td>
          <td>${book.issueDate}</td>
          <td>${book.dueDate}</td>
          <td><span class="status-badge status-issued">${book.status.toUpperCase()}</span></td>
          <td>${actions}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    window.deleteBook = function(bookId) {
      const role = roleSelect.value;
      if (role !== 'teacher' && role !== 'admin') {
        alert('❌ Admin/Teacher access only!');
        return;
      }

      if (confirm('Delete this issued book record?')) {
        issuedBooks = issuedBooks.filter(b => b.id != bookId);
        localStorage.setItem('issuedBooks', JSON.stringify(issuedBooks));
        renderTable();
        alert('🗑️ Record deleted!');
      }
    };

    function clearForm() {
      issueForm.reset();
      bookSelect.innerHTML = '<option value="">Select Book</option>';
      bookSelect.disabled = true;
      teacherIdInput.value = '1001';
      updateAccess();
    }

    document.getElementById('issue-date').valueAsDate = new Date();
    document.getElementById('due-date').valueAsDate = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000);

    updateAccess();
    renderTable();
  </script>
</body>
</html>
